name: CI

on:
  workflow_dispatch:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  showcase:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download sample assets
        run: npx tsx tests/e2e/download-samples.ts

      - name: Build
        run: npm run build

      - name: Run showcase tests
        run: npx playwright test
        continue-on-error: true

      - name: Concatenate showcase videos
        run: |
          sudo apt-get install -y ffmpeg
          npx tsx tests/e2e/concat-videos.ts test-results videos/full-showcase.webm

      - name: Upload showcase artifacts
        uses: actions/upload-artifact@v4
        with:
          name: showcase-videos
          path: |
            test-results/
            !test-results/**/trace.zip
            videos/
          retention-days: 30
